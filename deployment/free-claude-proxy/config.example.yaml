# free-claude-proxy config (Sprint 15.16/15.17).
#
# Файл генерируется бэкендом из таблицы llm_providers — см. service.FreeClaudeProxyConfigBuilder.
# Не редактируйте вручную: при следующей записи всё затрётся. Этот пример — справочный для отладки.

# port — порт прокси внутри контейнера. Должен совпадать с EXPOSE в Dockerfile (8787).
port: 8787

# service_token — Bearer-токен, который ожидает прокси в Authorization-заголовке.
# Передаётся sandbox-у через env ANTHROPIC_AUTH_TOKEN.
service_token: "REPLACE_ME_RANDOM_HEX"

# providers — апстрим-провайдеры, на которые прокси проксирует запросы.
# Каждый provider экспонируется под уникальным "model name", который оркестратор
# подставляет в запросе Claude Code.
providers:
  - name: openrouter-auto
    kind: openrouter
    base_url: https://openrouter.ai/api/v1
    api_key: ${OPENROUTER_API_KEY}
    default_model: openrouter/auto

  - name: deepseek-chat
    kind: deepseek
    base_url: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}
    default_model: deepseek-chat

# routes — соответствие "anthropic-style model name" → имя провайдера выше.
# Прокси анализирует поле "model" входящего /v1/messages запроса и роутит на нужный апстрим.
routes:
  claude-3-5-sonnet-20240620: openrouter-auto
  claude-3-haiku-20240307: deepseek-chat
