# common — базовые пакеты + firewall.
- name: Базовые пакеты
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg, ufw, cron, git, rsync]
    state: present
    update_cache: true

# UFW. Важно: Docker публикует порты в обход UFW через iptables, НО в «варианте 0»
# наружу Docker публикует только 80/443 (которые мы и так открываем), а все внутренние
# сервисы забинжены на 127.0.0.1 — поэтому footgun «Docker bypasses UFW» здесь не стреляет.
- name: UFW — deny incoming по умолчанию
  community.general.ufw:
    direction: incoming
    policy: deny

- name: UFW — allow outgoing по умолчанию
  community.general.ufw:
    direction: outgoing
    policy: allow

# SSH открываем ПЕРВЫМ, до enable, чтобы не отрезать себе доступ.
- name: UFW — разрешить SSH/HTTP/HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "{{ ansible_port | default(22) }}"
    - "80"
    - "443"

- name: UFW — включить
  community.general.ufw:
    state: enabled
