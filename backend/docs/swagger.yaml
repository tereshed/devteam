info:
  contact:
    email: support@example.com
    name: API Support
  description: Backend API с авторизацией на JWT токенах
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Backend API
  version: "1.0"
paths:
  /admin/agent-role-prompts:
    get:
      description: Возвращает реестр дефолтных системных промптов для каждой роли
        агента. Используется в админке для просмотра и редактирования.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.agentRolePromptResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List default role prompts
      tags:
      - admin-role-prompts
  /admin/agent-role-prompts/{role}:
    get:
      description: Возвращает дефолтный системный промпт для указанной роли агента.
      parameters:
      - description: Роль агента (assistant, orchestrator, router, planner, ...)
        in: path
        name: role
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.agentRolePromptResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get role prompt by role
      tags:
      - admin-role-prompts
    put:
      consumes:
      - application/json
      description: Обновляет content и description дефолтного промпта. Только для
        admin. Сброс к дефолту = удалить запись в БД + перезапустить backend (seed
        пересоздаст).
      parameters:
      - description: Роль агента
        in: path
        name: role
        required: true
        type: string
      - description: Новый промпт
        in: body
        name: body
