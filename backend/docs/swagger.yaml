      tags:
      - workflows
  /workflows/{name}/start:
    post:
      consumes:
      - application/json
      description: Запускает новый процесс выполнения воркфлоу
      parameters:
      - description: Имя воркфлоу
        in: path
        name: name
        required: true
        type: string
      - description: Входные данные
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.StartWorkflowRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ExecutionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
