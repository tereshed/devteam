          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2Password: []
      summary: Список сообщений задачи
      tags:
      - task-messages
    post:
      consumes:
      - application/json
      description: Добавляет пользовательское сообщение (коррекция, комментарий) к
        задаче
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      - description: Данные сообщения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTaskMessageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.TaskMessageResponse'
        "400":
          description: Невалидный JSON, пустой content, невалидный message_type
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "403":
          description: Нет доступа к проекту задачи
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "404":
          description: Задача не найдена
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2Password: []
      summary: Добавление сообщения
      tags:
      - task-messages
  /tasks/{id}/pause:
    post:
      description: Переводит задачу в state='paused'. Допустимо только из state='active'.
        Воркеры при pickup проверяют state и пропускают agent_job до Resume.
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TaskResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "403":
          description: Нет доступа к проекту задачи
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "404":
          description: Задача не найдена
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "409":
          description: Задача не в state='active' или уже терминальная
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2Password: []
      summary: Приостановка задачи
      tags:
      - tasks
  /tasks/{id}/resume:
    post:
      description: Переводит задачу из paused/needs_human/failed в active. Сбрасывает
        completed_at и пинает оркестратор (Router пересчитает следующее действие).
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TaskResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "403":
          description: Нет доступа к проекту задачи
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "404":
          description: Задача не найдена
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "409":
          description: Задача не в статусе paused/needs_human/failed
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "500":
          description: Внутренняя ошибка
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2Password: []
      summary: Возобновление задачи
      tags:
      - tasks
  /tasks/{id}/router-decisions:
    get:
      description: Все решения Router'а в порядке step_no. encrypted_raw_response
        НЕ возвращается.
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "403":
          description: no access to task
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List router decisions (timeline)
      tags:
      - orchestration-v2
  /tool-definitions:
    get:
      description: Возвращает активные записи реестра tool_definitions, отсортированные
        по category и name
      produces:
      - application/json
      responses:
        "200":
          description: OK
