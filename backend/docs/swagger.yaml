        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2Password: []
      summary: Список определений инструментов
      tags:
      - tool-definitions
  /webhooks:
    get:
      consumes:
      - application/json
      description: Возвращает все webhook-триггеры
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.WebhookResponse'
            type: array
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2Password: []
      summary: Список webhooks
      tags:
      - webhooks
    post:
      consumes:
      - application/json
      description: Создаёт новый webhook-триггер для workflow
      parameters:
      - description: Данные webhook
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateWebhookRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.WebhookResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2Password: []
      summary: Создание webhook
