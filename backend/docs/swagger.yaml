        MCP-tool и петля резюмируется; approved=false → синтетический deny payload,
        петля резюмируется и LLM объяснит отказ. Идемпотентно через атомарный UPDATE
        по tool_result IS NULL.
      parameters:
      - description: Session ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: tool_call_id + approved + (опц.) client_request_id
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ConfirmToolCallRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Принято, агент-петля резюмируется
          schema:
            $ref: '#/definitions/dto.ConfirmToolCallResponse'
        "400":
          description: Невалидные данные
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "401":
          description: Не авторизован
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "404":
          description: Сессия не найдена
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "409":
