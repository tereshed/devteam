      - BearerAuth: []
      - ApiKeyAuth: []
      - OAuth2Password: []
      summary: Запуск воркфлоу
      tags:
      - workflows
  /worktrees:
    get:
      description: Список git worktree'ев. Без task_id — admin-only; с task_id — нужен
        доступ к задаче.
      parameters:
      - description: Filter by task UUID
        in: query
        name: task_id
        type: string
      - description: Filter by state (allocated|in_use|released)
        in: query
        name: state
        type: string
      - description: Max items (default 200, capped at 200)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "403":
          description: no task_id requires admin role; task_id requires task access
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List worktrees (debug)
      tags:
      - orchestration-v2
  /worktrees/{id}/release:
    post:
      description: Принудительно выполняет git worktree remove --force и помечает
        запись released. Admin-only. Idempotent NOT — повторный вызов на released
        worktree возвращает 409.
      parameters:
      - description: Worktree UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.worktreeResponse'
        "400":
          description: invalid uuid
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "403":
          description: admin-only
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "404":
          description: worktree not found
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "409":
          description: worktree already released
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
        "503":
          description: worktree manager not configured
          schema:
            $ref: '#/definitions/apierror.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Manually release a worktree (admin)
      tags:
      - orchestration-v2
securityDefinitions:
  ApiKeyAuth:
    description: 'Long-lived API key for programmatic access. Format: wibe_<key>'
    in: header
    name: X-API-Key
    type: apiKey
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
  OAuth2Password:
    flow: password
    tokenUrl: /api/v1/auth/login
    type: oauth2
swagger: "2.0"
