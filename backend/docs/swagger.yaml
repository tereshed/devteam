      tags:
      - webhooks
  /webhooks/{id}/logs:
    get:
      consumes:
      - application/json
      description: Возвращает историю вызовов webhook
      parameters:
      - description: Webhook ID
        in: path
        name: id
        required: true
        type: string
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.WebhookLogResponse'
