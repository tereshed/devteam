name: reviewer
role: reviewer
prompt_name: reviewer_prompt
model_config:
  temperature: 0.1
  model: "claude-haiku-4-5-20251001"
is_active: true
# Sprint 15.25 — reviewer работает в основном на чтение: Read/Grep/Glob/LS + git diff/log/show.
# defaultMode=acceptEdits разрешает только Edit (для комментариев в коде ревью), записи в репо нет.
sandbox_permissions:
  defaultMode: acceptEdits
  allow:
    - Read
    - Grep
    - Glob
    - LS
    - Edit
    - "Bash(git diff:*)"
    - "Bash(git log:*)"
    - "Bash(git show:*)"
    - "Bash(git status:*)"
  deny:
    # Sprint 15.Major (defense-in-depth, как у developer.yaml).
    - "Bash(git push:*)"
    - "Bash(git push)"
    - "Bash(git reset:*)"
    - "Bash(git clean:*)"
    - "Bash(git branch -D:*)"
    - "Bash(git checkout --:*)"
    - "Bash(rm -rf:*)"
    - "Bash(rm -fr:*)"
    - "Bash(sudo:*)"
    - "Bash(make destroy:*)"
    - "Bash(make drop:*)"
    - "Bash(make clean:*)"
    - "Bash(make migrate-down:*)"
