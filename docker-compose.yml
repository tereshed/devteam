# Локальная разработка. Монтирование docker.sock даёт контейнеру app доступ к Docker API
# хоста (эквивалентно высоким привилегиям на машине разработчика). Для production нужна
# отдельная стратегия (TCP+TLS, оркестратор, прокси), а не сокет хоста в приложении.
services:
  yugabytedb:
    image: yugabytedb/yugabyte:2.20.1.0-b97
    container_name: wibe_yugabytedb
    command: >
      bin/yugabyted start
      --daemon=false
      --ui=false
      --advertise_address=yugabytedb
      --tserver_flags="ysql_enable_auth=false,pgsql_proxy_bind_address=0.0.0.0:5433,cql_proxy_bind_address=0.0.0.0:9042"
      --master_flags="rpc_bind_addresses=0.0.0.0:7100"
    ports:
      # Биндим на loopback: БД поднята с ysql_enable_auth=false (без пароля), поэтому
      # публиковать её на 0.0.0.0 нельзя. Локалке localhost:5433 доступен как раньше;
      # в prod доступ к БД — только внутри docker-сети (сервис yugabytedb:5433).
      - "127.0.0.1:5433:5433"   # YSQL (PostgreSQL-compatible)
      - "127.0.0.1:15000:7000"  # YugabyteDB Admin UI
      - "127.0.0.1:9042:9042"   # YCQL (Cassandra-compatible, optional)
    volumes:
      # ВАЖНО: yugabyted (под root) хранит данные в /root/var (base_dir = $HOME/var), НЕ в
      # /home/yugabyte/yb_data. Старый монтаж на /home/yugabyte/yb_data оставлял volume пустым,
      # а данные жили в эфемерном слое контейнера и терялись при пересоздании. Монтируем в
      # реальный data-dir, чтобы БД действительно персистилась.
      - yugabyte_data:/root/var
    healthcheck:
      test: ["CMD-SHELL", "/home/yugabyte/bin/ysqlsh -h 127.0.0.1 -U yugabyte -c '\\l' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s


  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.24.1
    container_name: wibe_weaviate
    ports:
      # Loopback: Weaviate с ANONYMOUS_ACCESS=true — наружу публиковать нельзя.
      - "127.0.0.1:8082:8080"  # Внешний порт 8082 (8081 теперь занят MCP-сервером)
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-transformers'
      ENABLE_MODULES: 'text2vec-transformers'
      TRANSFORMERS_INFERENCE_API: 'http://t2v-transformers:8080'
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Transformers service для векторизации (мультиязычная модель)
  t2v-transformers:
    image: cr.weaviate.io/semitechnologies/transformers-inference:sentence-transformers-paraphrase-multilingual-MiniLM-L12-v2
    container_name: wibe_transformers
    environment:
      ENABLE_CUDA: '0'  # Установите '1' если есть GPU
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import requests; requests.get('http://localhost:8080/.well-known/ready').raise_for_status()\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 90s  # Модель загружается ~30-90 секунд

  # Redis: low-latency wakeup воркеров (Pub/Sub) + кросс-нодовая доставка WebSocket-сообщений
  # при горизонтальном масштабировании (несколько реплик app за балансировщиком).
  # Только pub/sub + эфемерный wakeup — персистентность не нужна, RDB/AOF отключены.
  redis:
    image: redis:7-alpine
    container_name: wibe_redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      # Loopback: Redis без пароля — наружу не публикуем.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Миграции — одноразовый job. Накатывает goose ДО старта app (и реплик при scale),
  # чтобы goose.Up не бежал на каждой реплике одновременно (гонка goose_db_version).
  # restart: "no" + depends_on(service_completed_successfully) у app.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: devteam-backend:local
    container_name: wibe_migrate
    command: ["./migrate"]
    restart: "no"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: yugabytedb
      DB_PORT: 5433
      DB_USER: yugabyte
      DB_PASSWORD: yugabyte
      DB_NAME: yugabyte
      DB_SSLMODE: disable
    depends_on:
      yugabytedb:
        condition: service_healthy

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: devteam-backend:local
    env_file:
      - ./backend/.env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: yugabytedb
      DB_PORT: 5433
      DB_USER: yugabyte
      DB_PASSWORD: yugabyte
      DB_NAME: yugabyte
      DB_SSLMODE: disable
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      # LLM_PROVIDER / LLM_MODEL / LLM_API_KEY и провайдер-специфичные
      # ключи (ANTHROPIC_API_KEY, OPENAI_API_KEY, ...) подхватываются из
      # ./backend/.env через env_file выше — здесь не переопределяем.
      # MCP Server
      MCP_PORT: 8081
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-}
      WEAVIATE_HOST: weaviate:8080
      WEAVIATE_SCHEME: http
      # Redis для wakeup воркеров и кросс-нодового WS fan-out. На одной машине с
      # одной репликой не обязателен, но включён для low-latency и готовности к scale.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Миграции накатывает сервис migrate (см. выше) — app их на старте не трогает.
      AUTO_MIGRATE: "false"
      SANDBOX_KEEP_ON_FAILURE: "1"
      # Размер пулов оркестратора. Для локальной разработки держим маленькими:
      # каждый воркер опрашивает Yugabyte через распределённый SELECT FOR UPDATE
      # SKIP LOCKED, и большой пул в полку грузит CPU вхолостую. Прод-дефолты в
      # коде (5 step + 22 agent) — здесь переопределяем под одну машину.
      ORCHESTRATOR_STEP_WORKERS: ${ORCHESTRATOR_STEP_WORKERS:-2}
      ORCHESTRATOR_AGENT_WORKERS: ${ORCHESTRATOR_AGENT_WORKERS:-4}
    ports:
      # Loopback: в prod наружу смотрит только Caddy (deployment/prod), а до app он
      # ходит по docker-сети (app:8080 / app:8081). Локалке localhost:8080 как раньше.
      - "127.0.0.1:8080:8080"   # Основной API (Gin)
      - "127.0.0.1:8081:8081"   # MCP сервер (Model Context Protocol)
    volumes:
      - ./backend/db/migrations:/root/db/migrations
      - /var/run/docker.sock:/var/run/docker.sock
    # TODO: Если бэкенд перейдет на non-root пользователя в Dockerfile, 
    # фоллбек 0 (root) не даст доступа к сокету. Потребуется явно передавать DOCKER_GID.
    group_add:
      - "${DOCKER_GID:-0}"
    depends_on:
      yugabytedb:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  yugabyte_data:
  weaviate_data:
