name: frontend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3
  
  # Networking
  dio: ^5.4.0
  
  # Routing
  go_router: ^17.0.0
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # Code Generation Annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  retrofit: ^4.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^3.0.3
  freezed: ^3.2.3
  json_serializable: ^6.7.1
  
  # Testing
  mocktail: ^1.0.0
  mockito: ^5.6.1
  integration_test:
    sdk: flutter
  retrofit_generator: ^10.2.0

flutter:
  uses-material-design: true
  
  # Локализация
  generate: true
