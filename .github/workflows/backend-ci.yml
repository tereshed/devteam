name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      - name: Validate agent prompts (6.8)
        run: go test ./pkg/agentprompts -run TestValidateAllYAMLAgainstSchema -count=1
      - name: Validate agent configs (6.9)
        run: go test ./pkg/agentsloader -run TestValidateAgentConfigs -count=1
      - name: Unit tests
        run: go test -race ./... -count=1
